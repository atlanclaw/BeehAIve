# config/resource-budgets.yaml
# Consumed by: l0-platform/resource_manager.py (RESOURCE_BUDGETS_CONFIG)
# Schema: services.<container_name>.memory_{hard,soft}_mb + cpu_hard

version: "1"

services:
  pkb-resource-manager:
    memory_hard_mb: 256
    memory_soft_mb: 64
    cpu_hard: 0.1

  pkb-ingestion:
    memory_hard_mb: 256
    memory_soft_mb: 64
    cpu_hard: 0.2

  pkb-beeai:
    memory_hard_mb: 128
    memory_soft_mb: 64
    cpu_hard: 0.1

  l3-dispatcher:
    memory_hard_mb: 128
    memory_soft_mb: 64
    cpu_hard: 0.1

  pkb-gateway:
    memory_hard_mb: 128
    memory_soft_mb: 64
    cpu_hard: 0.1

  pkb-auditor:
    memory_hard_mb: 64
    memory_soft_mb: 32
    cpu_hard: 0.05

# Globale Schwellwerte (fuer zukuenftige Erweiterung /budget/check)
global:
  total_memory_hard_mb: 1024
  total_cpu_hard: 0.7
  oom_policy: log_and_restart   # log_and_restart | kill_and_alert
